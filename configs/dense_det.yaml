model:
  variant: small
  backbone_dims: [16, 32, 64, 128]
  backbone_depths: [2, 2, 4, 2]
  head_depth: 2
  use_quality_head: true

data:
  format: detection
  num_classes: 6
  class_names:
    - crack
    - dent
    - corrosion
    - scratch
    - missing-head
    - paint-peel-off
  image_size: 640

train:
  epochs: 45
  patience: 8
  batch_size: 8
  accumulation_steps: 2
  num_workers: 4
  image_size: 640
  balanced_sampler: true
  use_ema: true
  ema_decay: 0.9998
  mixed_precision: true

optimizer:
  lr: 0.0004
  weight_decay: 0.01

scheduler:
  warmup_epochs: 5
  eta_min_ratio: 0.05

loss:
  assigner: atss
  quality: 1.0

augmentation:
  enabled: true
  close_after_epochs: 35
  fliplr: 0.5
  hsv_h: 0.01
  hsv_s: 0.3
  hsv_v: 0.15
  blur_prob: 0.01
  grayscale_prob: 0.0
  equalize_prob: 0.01
  erasing_prob: 0.05

eval:
  batch_size: 8
  conf_thresh: 0.05
  iou_thresh: 0.5
  nms_iou: 0.6
  during_train_every_epochs: 5
  during_train_max_batches: null
  checkpoint_metric: map50_95

checkpoint:
  save_dir: runs/dense_det
