model:
  variant: small
  backbone_dims: [16, 32, 64, 128]
  backbone_depths: [2, 2, 4, 2]
  head_depth: 2
  use_quality_head: true

data:
  format: detection
  num_classes: 6
  class_names:
    - crack
    - dent
    - corrosion
    - scratch
    - missing-head
    - paint-peel-off
  image_size: 640

train:
  epochs: 45
  patience: 8
  batch_size: 8
  accumulation_steps: 2
  num_workers: 2
  image_size: 640
  balanced_sampler: true
  use_ema: true
  ema_decay: 0.9998
  mixed_precision: true

optimizer:
  lr: 0.0004
  weight_decay: 0.01

scheduler:
  warmup_epochs: 5
  eta_min_ratio: 0.05

loss:
  assigner: atss
  quality: 1.0

augmentation:
  enabled: true
  close_after_epochs: 35
  fliplr: 0.5
  hsv_h: 0.01
  hsv_s: 0.3
  hsv_v: 0.15
  blur_prob: 0.01
  grayscale_prob: 0.0
  equalize_prob: 0.01
  erasing_prob: 0.05

eval:
  batch_size: 8
  conf_thresh: 0.001
  iou_thresh: 0.5
  nms_iou: 0.6
  max_det: 300
  during_train_every_epochs: 5
  during_train_max_batches: null
  checkpoint_metric: map50_95

checkpoint:
  save_dir: runs/dense_det

benchmark:
  name: yolo_nano
  split: val
  images: 1476
  instances: 2944
  metrics:
    precision: 0.708
    recall: 0.489
    map50: 0.543
    map50_95: 0.336
  classes:
    crack:
      images: 629
      instances: 914
      precision: 0.794
      recall: 0.745
      map50: 0.769
      map50_95: 0.506
    dent:
      images: 674
      instances: 1140
      precision: 0.810
      recall: 0.704
      map50: 0.773
      map50_95: 0.496
    corrosion:
      images: 112
      instances: 197
      precision: 0.647
      recall: 0.695
      map50: 0.715
      map50_95: 0.460
    scratch:
      images: 46
      instances: 152
      precision: 0.734
      recall: 0.204
      map50: 0.266
      map50_95: 0.114
    missing-head:
      images: 95
      instances: 327
      precision: 0.516
      recall: 0.229
      map50: 0.242
      map50_95: 0.143
    paint-peel-off:
      images: 93
      instances: 214
      precision: 0.748
      recall: 0.355
      map50: 0.492
      map50_95: 0.264
