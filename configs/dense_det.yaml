model:
  variant: small
  backbone_dims: [16, 32, 64, 128]
  backbone_depths: [2, 3, 3, 2]
  head_depth: 2
  use_quality_head: true

data:
  format: detection
  num_classes: 6
  class_names:
    - crack
    - dent
    - corrosion
    - scratch
    - missing-head
    - paint-peel-off
  image_size: 640

train:
  epochs: 45
  patience: 8
  batch_size: 8
  accumulation_steps: 2
  num_workers: 2
  image_size: 640
  balanced_sampler: false
  use_ema: true
  ema_decay: 0.9998
  mixed_precision: true

optimizer:
  lr: 0.0004
  weight_decay: 0.01

scheduler:
  warmup_epochs: 5
  eta_min_ratio: 0.05

loss:
  assigner: atss
  quality: 1.0

augmentation:
  enabled: true
  close_after_epochs: 20
  fliplr: 0.3
  flipud: 0.0
  rotate_deg: 5
  mosaic_prob: 0.0
  hsv_h: 0.005
  hsv_s: 0.1
  hsv_v: 0.05
  blur_prob: 0.0
  grayscale_prob: 0.0
  equalize_prob: 0.0
  erasing_prob: 0.0

eval:
  batch_size: 8
  conf_thresh: 0.05
  iou_thresh: 0.5
  nms_iou: 0.6
  max_det: 300
  use_ema: true
  during_train_every_epochs: 2
  during_train_max_batches: 50
  checkpoint_metric: map50_95

checkpoint:
  save_dir: runs/dense_det

benchmark:
  name: yolo_nano
  split: val
  images: 1476
  instances: 2944
  metrics:
    precision: 0.714
    recall: 0.531
    map50: 0.567
    map50_95: 0.361
  classes:
    crack:
      images: 629
      instances: 914
      precision: 0.803
      recall: 0.768
      map50: 0.789
      map50_95: 0.524
    dent:
      images: 674
      instances: 1140
      precision: 0.819
      recall: 0.746
      map50: 0.795
      map50_95: 0.526
    corrosion:
      images: 112
      instances: 197
      precision: 0.653
      recall: 0.755
      map50: 0.752
      map50_95: 0.511
    scratch:
      images: 46
      instances: 152
      precision: 0.761
      recall: 0.273
      map50: 0.316
      map50_95: 0.183
    missing-head:
      images: 95
      instances: 327
      precision: 0.459
      recall: 0.255
      map50: 0.259
      map50_95: 0.156
    paint-peel-off:
      images: 93
      instances: 214
      precision: 0.783
      recall: 0.435
      map50: 0.509
      map50_95: 0.268
