model:
  variant: small
  backbone_name: vst_custom
  backbone_dims: [16, 32, 64, 128]
  backbone_depths: [2, 2, 4, 2]
  neck_name: cafpn_p2
  head_depth: 2
  use_detail_branch: true
  stem_type: frequency_decoupled
  backbone_block: anisotropic_strip
  refine_block: adaptive_spectral
  use_gradient_preservation_neck: false
  use_quality_head: true
  head_type: evidential
  use_class_conditional_gn: true
  use_auxiliary_heads: true
  use_polarized_attention: true
  pretrained_backbone: false
  pretrained_backbone_path: null

data:
  format: detection
  num_classes: 6
  class_names:
    - crack
    - dent
    - corrosion
    - scratch
    - missing-head
    - paint-peel-off
  image_size: 640

train:
  epochs: 80
  patience: 15
  batch_size: 8
  num_workers: 0
  image_size: 640
  balanced_sampler: true
  use_ema: true
  ema_decay: 0.9998

optimizer:
  lr: 0.0004
  # FIX: was ignored in original (hardcoded 0.0005 in train_dense.py).
  # Now read correctly. 0.05 is standard for AdamW on ViT-style models;
  # for conv-heavy detectors 0.01 is also common. Set based on your model.
  weight_decay: 0.01

scheduler:
  warmup_epochs: 10
  eta_min_ratio: 0.01

loss:
  assigner: atss
  box_loss: ewiou
  quality: 1.0
  auxiliary: 0.25
  uncertainty_weighted_varifocal: true
  # FIX: added for EvidentialQualityHead KL annealing.
  # Set to 0 to disable (pure NLL), or ~20 to anneal KL weight from 0→1
  # over the first 20 epochs. Only has effect with EvidentialQualityHead.
  evidential_kl_anneal_epochs: 20

augmentation:
  enabled: true
  close_after_epochs: 60
  fliplr: 0.5
  hsv_h: 0.01
  hsv_s: 0.4
  hsv_v: 0.2
  blur_prob: 0.02
  grayscale_prob: 0.0
  equalize_prob: 0.02
  erasing_prob: 0.1

eval:
  batch_size: 8
  conf_thresh: 0.25
  iou_thresh: 0.5
  nms_iou: 0.6
  during_train_every_epochs: 5
  during_train_max_batches: null
  checkpoint_metric: map50_95

checkpoint:
  save_dir: runs/dense_det
  save_period_batches: 0
